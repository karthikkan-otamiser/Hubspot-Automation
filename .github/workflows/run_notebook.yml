name: Run HubSpot Ranking Notebook

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  run-notebook:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install papermill jupyter nbconvert
          pip install requests pandas gspread

      - name: Run notebook
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          API_KEY: ${{ secrets.API_KEY }}
          MARKET_SIZE: ${{ secrets.MARKET_SIZE }}
        run: |
          papermill "HubspotxRank_Updated.ipynb" output.ipynb --log-output

      - name: Upload output notebook
        uses: actions/upload-artifact@v4
        with:
          name: notebook-output
          path: output.ipynb
