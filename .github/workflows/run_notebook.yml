name: Run Notebook on Schedule

on:
  schedule:
    - cron: '0 8 * * *'   # 8:00 AM UTC (9 AM Germany winter / 10 AM summer)
    - cron: '0 20 * * *'  # 8:00 PM UTC (9 PM Germany winter / 10 PM summer)
  workflow_dispatch:      # Also allows manual triggering

jobs:
  run-notebook:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install papermill jupyter nbconvert
          pip install -r requirements.txt  # your notebook's dependencies

      - name: Run notebook
        run: |
          papermill your_notebook.ipynb output.ipynb \
            --log-output

      - name: Upload output notebook
        uses: actions/upload-artifact@v4
        with:
          name: notebook-output
          path: output.ipynb
